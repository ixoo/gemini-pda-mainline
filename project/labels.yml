# Declarative inventory for GitHub labels. Colors omit the leading '#'.
- name: "type: meta"
  color: "1D76DB"
  description: "Project coordination and cross-cutting plans"
- name: "type: implementation"
  color: "0E8A16"
  description: "Code or Device Tree implementation"
- name: "type: research"
  color: "D4C5F9"
  description: "Hardware archaeology or feasibility research"
- name: "type: documentation"
  color: "0075CA"
  description: "Documentation and knowledge capture"
- name: "type: upstream"
  color: "5319E7"
  description: "Upstream submission or review tracking"
- name: "type: testing"
  color: "BFDADC"
  description: "Hardware validation or regression coverage"
- name: "type: bug"
  color: "D73A4A"
  description: "Confirmed defect or regression"
- name: "type: decision"
  color: "FBCA04"
  description: "Architecture or policy decision record"

