- name: "status: ready"
  color: "0E8A16"
  description: "Scoped and ready for a contributor"
- name: "status: blocked"
  color: "B60205"
  description: "Cannot progress until a named dependency changes"
- name: "status: needs evidence"
  color: "FBCA04"
  description: "A claim or design needs stronger evidence"
- name: "status: upstream review"
  color: "5319E7"
  description: "Patch series is actively under upstream review"
- name: "status: waiting upstream"
  color: "E4E669"
  description: "Waiting for an external upstream dependency"

- name: "priority: P0"
  color: "B60205"
  description: "Required for the current safe bring-up loop"
- name: "priority: P1"
  color: "D93F0B"
  description: "Next milestone or major dependency"
- name: "priority: P2"
  color: "FBCA04"
  description: "Important after core serviceability"
- name: "priority: P3"
  color: "C2E0C6"
  description: "Deferred or optional work"

- name: "hardware: required"
  color: "0052CC"
  description: "Needs access to Gemini hardware for completion"
- name: "hardware: x25"
  color: "006B75"
  description: "Applies to or needs validation on X25"
- name: "hardware: x27"
  color: "006B75"
  description: "Applies to or needs validation on X27"
- name: "hardware: wifi-only"
  color: "006B75"
  description: "Applies to or needs validation on Wi-Fi-only hardware"
- name: "hardware: lte"
  color: "006B75"
  description: "Applies to or needs validation on LTE hardware"

- name: "safety: brick-risk"
  color: "B60205"
  description: "Incorrect work can compromise boot or recovery"
- name: "safety: data-loss"
  color: "D93F0B"
  description: "Incorrect work can erase or corrupt persistent data"

- name: "upstream: not-started"
  color: "E4E669"
  description: "No public upstream patch series yet"
- name: "upstream: rfc"
  color: "C5DEF5"
  description: "Public RFC series posted"
- name: "upstream: submitted"
  color: "5319E7"
  description: "Formal patch series under upstream review"
- name: "upstream: accepted"
  color: "0E8A16"
  description: "Change is in a maintainer tree"
- name: "upstream: released"
  color: "006B75"
  description: "Change is present in a tagged upstream release"
