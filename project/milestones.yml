- title: "M0 — Safe reproducible lab"
  description: "Recovery, variants, provenance, reproducible builds, and non-destructive CI are established before risky bring-up."
- title: "M1 — Current-mainline UART boot"
  description: "A current upstream-derived kernel reaches initramfs over UART repeatedly with core CPU, memory, timer, interrupt, and clock behavior validated."
- title: "M2 — Persistent headless system"
  description: "PMIC basics, eMMC root, USB gadget networking/serial, SSH, and safe battery telemetry work."
- title: "M3 — Keyboard and USB serviceability"
  description: "Built-in keyboard, microSD, both USB-C paths, role switching, and hotplug are usable and regression-tested."
- title: "M4 — Native display and touch"
  description: "DRM/KMS, native panel/backlight, and touchscreen provide a locally interactive software-rendered system."
- title: "M5 — Mobile-grade power"
  description: "DVFS, thermal protection, runtime PM, suspend-to-RAM, wake, and measured idle/suspend behavior are reliable."
- title: "M6 — Daily-driver peripherals"
  description: "GPU, audio, Wi-Fi, Bluetooth, GNSS, and sensors work through maintainable upstream interfaces."
- title: "M7 — Standard boot and distro integration"
  description: "Standard boot artifacts, retained recovery, released-kernel support, and ordinary distribution packaging replace the project-specific boot path."
- title: "Stretch — Cellular and optional hardware"
  description: "Non-blocking research and enablement for cellular transport, cameras, external display, and deeper early-firmware ownership."
